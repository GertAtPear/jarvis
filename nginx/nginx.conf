events {
  worker_connections 2048;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 32m;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/x-javascript text/xml application/xml text/javascript;
  gzip_min_length 1000;

  # Shared proxy headers (reused across locations via include or repeat)
  proxy_http_version  1.1;
  proxy_set_header    Host              $host;
  proxy_set_header    X-Real-IP         $remote_addr;
  proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header    X-Forwarded-Proto $scheme;
  proxy_read_timeout  120s;
  proxy_connect_timeout 10s;

  # Re-resolve container hostnames every 30s so IP changes after restarts are picked up.
  # With set $var + proxy_pass $var, nginx re-resolves on each new connection window.
  resolver 10.89.0.1 valid=30s ipv6=off;

  # ── HTTP → HTTPS redirect (all domains) ───────────────────────────────
  server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;    # Certbot webroot challenge
    }
    location / {
      return 301 https://$host:8443$request_uri;
    }
  }

  # ── AI Platform: ai.mediahost.co.za ───────────────────────────────────
  server {
    listen 443 ssl;
    server_name ${AI_DOMAIN};

    ssl_certificate     /etc/nginx/certs/ai/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Blazor Server + SignalR — WebSocket upgrade required
    location / {
      set $ui http://jarvis-ui:5002;
      proxy_pass $ui;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 3600s;   # Long timeout for SignalR keep-alive
      proxy_buffering off;        # Required for SSE / streaming
    }

    # Jarvis orchestrator API
    location /api/ {
      set $api http://jarvis-api:5000;
      proxy_pass $api;
    }

    # Health check (no auth)
    location /health {
      set $api http://jarvis-api:5000;
      proxy_pass $api;
      access_log off;
    }

    # Agents admin — restrict to internal IPs only
    location /agents/ {
      allow 192.168.0.0/16;
      allow 10.0.0.0/8;
      allow 127.0.0.1;
      deny  all;
      set $andrew http://host.containers.internal:5001;
      proxy_pass $andrew/;
    }
  }

  # ── Infisical Vault: vault.mediahost.co.za ─────────────────────────────
  server {
    listen 443 ssl;
    server_name ${VAULT_DOMAIN};

    ssl_certificate     /etc/nginx/certs/vault/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/vault/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    location / {
      set $vault http://infisical:8080;
      proxy_pass          $vault;
      proxy_set_header    Upgrade    $http_upgrade;
      proxy_set_header    Connection "upgrade";
      proxy_read_timeout  120s;
      proxy_buffering     off;

      proxy_redirect http://infisical:8080/ https://${VAULT_DOMAIN}/;
    }

    location /api/status {
      set $vault http://infisical:8080;
      proxy_pass $vault;
      access_log off;
    }
  }
}
