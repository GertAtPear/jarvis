version: "3.9"

networks:
  mediahost-ai:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  infisical_data:
  infisical_redis_data:
  nginx_certs:
  certbot_webroot:
  jarvis_ui_dp_keys:

services:

  # ─── SECRETS VAULT (Infisical) ────────────────────────────────────────────

  infisical-db:
    image: docker.io/library/postgres:16-alpine
    container_name: infisical-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: infisical
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${INFISICAL_DB_PASSWORD}
    volumes:
      - infisical_data:/var/lib/postgresql/data
    networks:
      - mediahost-ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      interval: 10s
      timeout: 5s
      retries: 5

  infisical-redis:
    image: docker.io/library/redis:7-alpine
    container_name: infisical-redis
    restart: unless-stopped
    command: redis-server --requirepass ${INFISICAL_REDIS_PASSWORD}
    volumes:
      - infisical_redis_data:/data
    networks:
      - mediahost-ai

  infisical:
    image: docker.io/infisical/infisical:latest-postgres
    container_name: infisical
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_CONNECTION_URI: postgresql://infisical:${INFISICAL_DB_PASSWORD}@infisical-db:5432/infisical
      REDIS_URL: redis://:${INFISICAL_REDIS_PASSWORD}@infisical-redis:6379
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      SITE_URL: https://${DOMAIN}/vault
    ports:
      - "8080:8080"
    networks:
      - mediahost-ai

  # ─── PLATFORM DATABASE ────────────────────────────────────────────────────

  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: mediahost-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mediahostai
      POSTGRES_USER: mediahostai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"   # exposed on loopback for andrew-agent (host network)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - mediahost-ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediahostai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── CACHE ────────────────────────────────────────────────────────────────

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: mediahost-ai-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"   # exposed on loopback for andrew-agent (host network)
    volumes:
      - redis_data:/data
    networks:
      - mediahost-ai

  # ─── APP SERVICES ─────────────────────────────────────────────────────────
  # Build contexts use the solution root (.) so Dockerfiles can COPY shared libs.

  jarvis-api:
    build:
      context: .
      dockerfile: src/Jarvis.Api/Dockerfile
    container_name: jarvis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Postgres: Host=postgres;Database=mediahostai;Username=mediahostai;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD}
      Infisical__BaseUrl: http://infisical:8080
      Infisical__ClientId: ${INFISICAL_CLIENT_ID}
      Infisical__ClientSecret: ${INFISICAL_CLIENT_SECRET}
      Infisical__ProjectId: ${INFISICAL_PROJECT_ID}
      Infisical__Environment: prod
      Agents__AndrewBaseUrl: http://host.containers.internal:5001
      Agents__EveBaseUrl: http://eve-agent:5003
      Agents__BrowserBaseUrl: http://browser-agent:5004
      Agents__RexBaseUrl: http://rex-agent:5005
    networks:
      - mediahost-ai
    volumes:
      - ./logs/jarvis:/app/logs

  jarvis-ui:
    build:
      context: .
      dockerfile: src/Jarvis.Ui/Dockerfile
    container_name: jarvis-ui
    restart: unless-stopped
    depends_on:
      - jarvis-api
    environment:
      JarvisApi__BaseUrl: http://jarvis-api:5000
    networks:
      - mediahost-ai
    volumes:
      - jarvis_ui_dp_keys:/home/appuser/.aspnet/DataProtection-Keys

  eve-agent:
    build:
      context: .
      dockerfile: src/Eve.Agent/Dockerfile
    container_name: eve-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5003
      ConnectionStrings__Postgres: Host=postgres;Database=mediahostai;Username=mediahostai;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD}
      Infisical__BaseUrl: http://infisical:8080
      Infisical__ClientId: ${INFISICAL_CLIENT_ID}
      Infisical__ClientSecret: ${INFISICAL_CLIENT_SECRET}
      Infisical__ProjectId: ${INFISICAL_PROJECT_ID}
      Infisical__Environment: prod
      Eve__MorningBriefing__OnFirstOpen: true
      Eve__TimeZone: Africa/Johannesburg
    networks:
      - mediahost-ai
    volumes:
      - ./logs/eve:/app/logs

  browser-agent:
    build:
      context: .
      dockerfile: src/Browser.Agent/Dockerfile
    container_name: browser-agent
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5004
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD}
      Infisical__BaseUrl: http://infisical:8080
      Infisical__ClientId: ${INFISICAL_CLIENT_ID}
      Infisical__ClientSecret: ${INFISICAL_CLIENT_SECRET}
      Infisical__ProjectId: ${INFISICAL_PROJECT_ID}
      Infisical__Environment: prod
      Browser__MaxConcurrentSessions: 3
      Browser__DefaultTimeoutSeconds: 30
      Browser__Headless: true
    networks:
      - mediahost-ai
    volumes:
      - ./logs/browser:/app/logs
      - ./browser-screenshots:/app/screenshots
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN

  rex-agent:
    build:
      context: .
      dockerfile: src/Rex.Agent/Dockerfile
    container_name: rex-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5005
      ConnectionStrings__Postgres: Host=postgres;Database=mediahostai;Username=mediahostai;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD}
      Infisical__BaseUrl: http://infisical:8080
      Infisical__ClientId: ${INFISICAL_CLIENT_ID}
      Infisical__ClientSecret: ${INFISICAL_CLIENT_SECRET}
      Infisical__ProjectId: ${INFISICAL_PROJECT_ID}
      Infisical__Environment: prod
      Rex__WorkspacePath: /workspace
      Rex__ProjectPath: /project
      Rex__PodmanSocket: /run/podman/podman.sock
      Rex__GitUserName: Rex Agent
      Rex__GitUserEmail: rex@mediahost.ai
    volumes:
      - ./logs/rex:/app/logs
      - /home/gert/Documents/Projects/Pear:/workspace
      - .:/project
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock:z
    networks:
      - mediahost-ai

  andrew-agent:
    build:
      context: .
      dockerfile: src/Andrew.Agent/Dockerfile
    container_name: andrew-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__Postgres: Host=localhost;Port=5432;Database=mediahostai;Username=mediahostai;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: localhost:6379,password=${REDIS_PASSWORD}
      Infisical__BaseUrl: http://localhost:8080
      Infisical__ClientId: ${INFISICAL_CLIENT_ID}
      Infisical__ClientSecret: ${INFISICAL_CLIENT_SECRET}
      Infisical__ProjectId: ${INFISICAL_PROJECT_ID}
      Infisical__Environment: prod
      Andrew__Discovery__IntervalHours: 4
      Andrew__Ssh__TimeoutSeconds: 10
      Andrew__Ssh__MaxParallelConnections: 5
    network_mode: host
    # Andrew uses host networking so it can reach your LAN/VPN servers directly.
    # NOTE: On host network, other services reach Andrew at localhost:5001
    cap_add:
      - NET_RAW   # required for ping (ICMP raw sockets)
    volumes:
      - ./logs/andrew:/app/logs
      - ./ssh-keys:/app/ssh-keys:ro

  # ─── NGINX REVERSE PROXY ──────────────────────────────────────────────────
  # Uncomment nginx together with the app services — nginx requires jarvis-ui:5002
  # and jarvis-api:5000 to be resolvable at startup or it will refuse to start.
  # For production TLS on ports 80/443 run:
  #   sudo sysctl -w net.ipv4.ip_unprivileged_port_start=80
  # then change ports back to "80:80" / "443:443".

  nginx:
    image: docker.io/library/nginx:alpine
    container_name: mediahost-ai-nginx
    restart: unless-stopped
    depends_on:
      - jarvis-ui
      - infisical
    ports:
      - "8081:80"
      - "8443:443"
    command: /bin/sh -c "envsubst '$$AI_DOMAIN $$VAULT_DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./nginx/nginx.env:/etc/nginx/nginx.env:ro
      - ./nginx/certs:/etc/nginx/certs:ro  # dev: self-signed certs; prod: run get-certs.sh then switch to nginx_certs volume
      - certbot_webroot:/var/www/certbot
    env_file:
      - ./nginx/nginx.env
    networks:
      - mediahost-ai

  # ─── CERTBOT (Let's Encrypt) ───────────────────────────────────────────────

  certbot:
    image: docker.io/certbot/certbot:latest
    container_name: mediahost-certbot
    volumes:
      - nginx_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Run manually: docker compose run certbot certonly ...
    # See scripts/get-certs.sh
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h; done"
    restart: unless-stopped